name: Weekly WCL Meta Update

on:
  schedule:
    - cron: '0 12 * * 3' # 12:00 UTC every Wednesday (post NA+EU weekly reset)
  workflow_dispatch:       # Manual trigger for testing

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ORBIT_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run WCL Aggregator Script
        env:
          WCL_CLIENT_ID: ${{ secrets.WCL_CLIENT_ID }}
          WCL_CLIENT_SECRET: ${{ secrets.WCL_CLIENT_SECRET }}
        run: python .scripts/build_meta.py

      - name: Commit and Push Updated Database
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Orbit_MetaTalents_Data/

          # Only commit if the data actually changed
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "data: Auto-update Weekly Meta Talents" && git push)
