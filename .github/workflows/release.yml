name: Release AddOn

on:
  push:
    tags:
      # MAJOR.MINOR created by auto-tag.yml (e.g. 0.249).
      # Historical X.Y.Z tags are also matched so prior releases stay reproducible.
      - "[0-9]*.[0-9]*"
      - "[0-9]*.[0-9]*.[0-9]*"

env:
  CF_API_KEY: ${{ secrets.CURSE_API_KEY }}
  GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Changelog Data
        run: python .scripts/update_changelog.py

      - name: Build and Package
        uses: BigWigsMods/packager@v2
