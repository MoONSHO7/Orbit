name: Auto Tag

on:
  push:
    branches:
      - main

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ORBIT_PAT }}

      - name: Calculate version and create tag
        run: |
          # Version scheme: MAJOR.MINOR.PATCH
          #   MAJOR  - manual only (we are pre-1.0)
          #   MINOR  - auto-bumped on every commit to main
          #   PATCH  - reserved for manual hotfixes
          LATEST_TAG=$(git tag --list '[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            # Bootstrap from the highest legacy integer tag so continuity is preserved.
            LEGACY_INT=$(git tag --list | grep -E '^[0-9]+$' | sort -n | tail -n 1)
            MAJOR=0
            MINOR=${LEGACY_INT:-0}
            PATCH=0
            echo "No X.Y.Z tag yet. Bootstrapping from legacy integer: ${LEGACY_INT:-(none)}"
          else
            MAJOR=$(echo "$LATEST_TAG" | cut -d. -f1)
            MINOR=$(echo "$LATEST_TAG" | cut -d. -f2)
            PATCH=$(echo "$LATEST_TAG" | cut -d. -f3)
          fi

          MINOR=$((MINOR + 1))
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Calculated version: $VERSION"

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists, skipping"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
